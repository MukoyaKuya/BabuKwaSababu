{% extends "base.html" %}

{% block content %}
<section class="min-h-[50vh] bg-[#2522e8] flex flex-col items-center justify-center text-center px-6">
    <h1 class="text-6xl md:text-9xl font-display text-white mb-6 uppercase">FUEL THE CHANGE</h1>
    <p class="text-[#ff9600] font-display text-xl md:text-2xl uppercase tracking-[0.2em]">Support Babu Owino's Campaign</p>
</section>

<section class="py-20 bg-white px-6">
    <div class="max-w-xl mx-auto bg-[#ff9600] p-12 shadow-[12px_12px_0px_rgba(37,34,232,1)] border-4 border-[#2522e8] text-center">
        <h2 class="text-4xl font-display text-[#2522e8] mb-8">SELECT AN AMOUNT</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="bg-white border-4 border-[#2522e8] p-4 text-2xl font-display text-[#2522e8] hover:bg-black hover:text-white transition-colors uppercase">KSH 500</button>
            <button class="bg-white border-4 border-[#2522e8] p-4 text-2xl font-display text-[#2522e8] hover:bg-black hover:text-white transition-colors uppercase">KSH 1,000</button>
            <button class="bg-white border-4 border-[#2522e8] p-4 text-2xl font-display text-[#2522e8] hover:bg-black hover:text-white transition-colors uppercase">KSH 5,000</button>
            <button class="bg-white border-4 border-[#2522e8] p-4 text-2xl font-display text-[#2522e8] hover:bg-black hover:text-white transition-colors uppercase">OTHER</button>
        </div>
        
        <button class="w-full bg-[#2522e8] text-white py-6 font-display text-2xl hover:bg-black transition-all shadow-xl uppercase">DONATE NOW</button>
        
        <p class="mt-8 text-xs text-blue-900 font-bold uppercase tracking-tight opacity-70">
            Contributions to the Babu Owino campaign are subject to local election laws.
        </p>
    </div>
</section>
{% endblock %}
